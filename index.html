<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lot Stacker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        /* แต่งสีแถบลาก Slider ให้เข้ากับธีม */
        input[type=range] { accent-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700">
        <h1 class="text-2xl font-bold text-blue-400 mb-6 border-b border-gray-700 pb-2">🎲 Lot Stacker Pro</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 bg-gray-700 p-4 rounded-lg">
            <div>
                <label class="block text-sm text-gray-300 mb-1">Current Balance ($)</label>
                <div class="flex items-center space-x-2">
                    <input type="range" id="balanceSlider" min="10" max="500" step="1" value="49.6" class="w-1/2 cursor-pointer" oninput="syncInput('balance', this.value); calculate()">
                    <input type="number" id="balance" value="49.6" step="0.1" class="w-1/2 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white font-mono" oninput="syncInput('balanceSlider', this.value); calculate()">
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Stop Out Level (%)</label>
                <div class="flex items-center space-x-2">
                    <input type="range" id="stopoutSlider" min="0" max="100" step="1" value="20" class="w-1/2 cursor-pointer" oninput="syncInput('stopout', this.value); calculate()">
                    <input type="number" id="stopout" value="20" step="1" class="w-1/2 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white font-mono" oninput="syncInput('stopoutSlider', this.value); calculate()">
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Trade Direction</label>
                <select id="direction" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white h-[34px] font-bold" onchange="calculate()">
                    <option value="buy">BUY (Long)</option>
                    <option value="sell">SELL (Short)</option>
                </select>
            </div>
        </div>

        <div class="mb-4 flex justify-between items-end">
            <h2 class="text-lg font-semibold text-green-400">📋 Active Positions</h2>
            <button onclick="addPosition()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-medium transition duration-200">
                + Add Position
            </button>
        </div>

        <div class="overflow-x-auto mb-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-700 text-sm text-gray-300">
                        <th class="p-3 rounded-tl">#</th>
                        <th class="p-3">Lot Size (Drag or Type)</th>
                        <th class="p-3">Entry Price (Drag or Type)</th>
                        <th class="p-3 rounded-tr text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="position-list"></tbody>
            </table>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-900 border border-gray-700 rounded-lg p-5 shadow-inner">
            <div>
                <h2 class="text-xl font-bold text-yellow-400 mb-4">📊 Risk Summary</h2>
                <div class="space-y-3 text-sm md:text-base">
                    <div class="flex justify-between border-b border-gray-700 pb-2">
                        <span class="text-gray-400">Max Risk Allowed:</span>
                        <span id="res-risk" class="font-bold text-white">-$0.00</span>
                    </div>
                    <div class="flex justify-between border-b border-gray-700 pb-2">
                        <span class="text-gray-400">Total Lot Size:</span>
                        <span id="res-lot" class="font-bold text-white">0.00</span>
                    </div>
                    <div class="flex justify-between border-b border-gray-700 pb-2">
                        <span class="text-gray-400">Average Price:</span>
                        <span id="res-avgprice" class="font-bold text-blue-300">0.00</span>
                    </div>
                    <div class="flex justify-between border-b border-gray-700 pb-2">
                        <span class="text-gray-400">Stop Out Price:</span>
                        <span id="res-stopout" class="font-bold text-red-400">0.00</span>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-col justify-center bg-gray-800 p-4 rounded-lg border border-gray-700">
                <p class="text-gray-300 mb-2 text-center text-sm">Drawdown Buffer (Points)</p>
                <div class="text-4xl font-black text-center mb-4" id="res-distance">0 pts</div>
                <canvas id="riskChart" height="100"></canvas>
            </div>
        </div>

    </div>

    <script>
        let positions = [{ id: 1, lot: 0.04, price: 4700.00 }];
        let nextId = 2;
        let chartInstance = null;

        // ฟังก์ชันซิงค์ค่าระหว่าง Slider กับช่องกรอกตัวเลข
        function syncInput(targetId, value) {
            document.getElementById(targetId).value = value;
        }

        function renderPositions() {
            const tbody = document.getElementById('position-list');
            tbody.innerHTML = '';
            
            positions.forEach((pos, index) => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-700 hover:bg-gray-750 transition duration-150';
                tr.innerHTML = `
                    <td class="p-3 font-medium text-gray-300">${index + 1}</td>
                    <td class="p-3">
                        <div class="flex items-center space-x-2">
                            <input type="range" min="0.01" max="0.2" step="0.01" value="${pos.lot}" 
                                   class="w-24 cursor-pointer" oninput="updatePos(${pos.id}, 'lot', this.value)">
                            <input type="number" step="0.01" value="${pos.lot}" 
                                   class="w-20 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white text-center font-mono"
                                   oninput="updatePos(${pos.id}, 'lot', this.value)">
                        </div>
                    </td>
                    <td class="p-3">
                        <div class="flex items-center space-x-2">
                            <input type="range" min="4500" max="5000" step="1" value="${pos.price}" 
                                   class="w-24 cursor-pointer" oninput="updatePos(${pos.id}, 'price', this.value)">
                            <input type="number" step="0.01" value="${pos.price}" 
                                   class="w-24 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white text-center font-mono"
                                   oninput="updatePos(${pos.id}, 'price', this.value)">
                        </div>
                    </td>
                    <td class="p-3 text-center">
                        <button onclick="removePosition(${pos.id})" class="text-red-400 hover:text-red-300 font-bold px-2 py-1 rounded hover:bg-red-900 hover:bg-opacity-30">
                            ✖
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            calculate();
        }

        function addPosition() {
            let lastPrice = positions.length > 0 ? positions[positions.length - 1].price : 4700;
            positions.push({ id: nextId++, lot: 0.01, price: lastPrice });
            renderPositions();
        }

        function removePosition(id) {
            positions = positions.filter(p => p.id !== id);
            renderPositions();
        }

        function updatePos(id, field, value) {
            const pos = positions.find(p => p.id === id);
            if (pos) {
                pos[field] = parseFloat(value) || 0;
                renderPositions(); 
            }
        }

        // เริ่มต้นสร้างกราฟ Chart.js
        function initChart() {
            const ctx = document.getElementById('riskChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Buffer'],
                    datasets: [{
                        label: 'Points Left',
                        data: [0],
                        backgroundColor: '#10B981',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { beginAtZero: true, suggestedMax: 2000, grid: { color: '#374151' } },
                        y: { display: false }
                    }
                }
            });
        }

        function calculate() {
            const balance = parseFloat(document.getElementById('balance').value) || 0;
            const stopoutPct = parseFloat(document.getElementById('stopout').value) || 0;
            const direction = document.getElementById('direction').value;
            
            const stopoutAmount = balance * (stopoutPct / 100);
            const maxRisk = balance - stopoutAmount;

            let totalLot = 0;
            let sumProduct = 0;
            let latestPrice = 0;

            positions.forEach(pos => {
                totalLot += pos.lot;
                sumProduct += (pos.lot * pos.price);
                latestPrice = pos.price; 
            });

            if (totalLot === 0) {
                updateUI(maxRisk, 0, 0, 0, 0);
                return;
            }

            const avgPrice = sumProduct / totalLot;
            const distanceUsd = maxRisk / (totalLot * 100);

            let stopOutPrice = 0;
            let pointsFromLatest = 0;

            if (direction === 'buy') {
                stopOutPrice = avgPrice - distanceUsd;
                pointsFromLatest = (latestPrice - stopOutPrice) * 100; 
            } else { 
                stopOutPrice = avgPrice + distanceUsd;
                pointsFromLatest = (stopOutPrice - latestPrice) * 100;
            }

            if (pointsFromLatest < 0) pointsFromLatest = 0;

            updateUI(maxRisk, totalLot, avgPrice, stopOutPrice, pointsFromLatest);
        }

        function updateUI(maxRisk, totalLot, avgPrice, stopOutPrice, points) {
            document.getElementById('res-risk').innerText = `-$${maxRisk.toFixed(2)}`;
            document.getElementById('res-lot').innerText = totalLot.toFixed(2);
            document.getElementById('res-avgprice').innerText = avgPrice.toFixed(2);
            document.getElementById('res-stopout').innerText = stopOutPrice.toFixed(2);
            
            const distEl = document.getElementById('res-distance');
            distEl.innerText = `${points.toFixed(0)} pts`;
            
            let colorHex = '#10B981'; // Green
            if (points < 500) {
                distEl.className = "text-4xl font-black text-center mb-4 text-red-500";
                colorHex = '#EF4444'; // Red
            } else if (points < 1000) {
                distEl.className = "text-4xl font-black text-center mb-4 text-yellow-500";
                colorHex = '#F59E0B'; // Yellow
            } else {
                distEl.className = "text-4xl font-black text-center mb-4 text-green-500";
            }

            // อัปเดตข้อมูลและสีกราฟแบบ Real-time
            if(chartInstance) {
                chartInstance.data.datasets[0].data = [points];
                chartInstance.data.datasets[0].backgroundColor = colorHex;
                chartInstance.update();
            }
        }

        // โหลดกราฟและข้อมูลเริ่มต้น
        initChart();
        renderPositions();
    </script>
</body>
</html>
